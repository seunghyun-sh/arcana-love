# Fly.io 배포 설정 — Arcana Love 백엔드
app = 'arcana-love-api'
primary_region = 'nrt'  # 도쿄 (한국 사용자에 가장 가까운 리전)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
