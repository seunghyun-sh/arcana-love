# Render Blueprint — Arcana Love 백엔드
services:
  - type: web
    name: arcana-love-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore  # 한국 사용자에 가장 가까운 리전
    plan: free
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false   # Render 대시보드에서 수동 입력
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: CORS_ORIGINS
        value: '["http://localhost:5173","https://seunghyun-sh.github.io"]'
      - key: LOG_LEVEL
        value: INFO
